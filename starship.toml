# After the ASCII Header Below have a empty line this is the Culprit <3
add_newline = false

"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Folder
[directory]
style = "blue"
format = "[≤░ΚΜ $path]($style) "

# Git branch
[git_branch]
symbol = "Όεξ "
style = "bright-black"
format = "[$symbol$branch]($style) "

# Git status (tiny but expressive)
[git_status]
style = "cyan"
format = "([$all_status$ahead_behind]($style)) "

conflicted = "έγΦ "
untracked  = "ΎΕρ "
modified   = "ΎΣβ "
staged     = "ΎΒΗ "
renamed    = "ΎΣγ "
deleted    = "ΎΣα "
stashed    = "ΎμΨ "

# Command duration (only shows if command was slow)
[cmd_duration]
min_time = 500
style = "yellow"
format = "[≤▒οθ $duration]($style) "

# Prompt arrow
[character]
success_symbol = "[έζψ](purple)"
error_symbol = "[έζψ](red)"
vimcmd_symbol = "[έζχ](green)"
